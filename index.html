<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Politieacademie - Proces-verbaal Training | Gemini Gem</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --p-blauw: #00205b;
            --p-geel: #fcc917;
            --wit: #ffffff;
            --grijs: #f4f4f4;
            --p-rood: #e30613;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--grijs);
            margin: 0;
            padding: 20px;
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--p-blauw);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
            border-top: 6px solid var(--p-geel);
        }

       <div class="video-box-login">
    <video width="100%" height="100%" controls poster="https://www.politie.nl/binaries/content/gallery/politie/algemeen/politielogo-blauw.jpg">
        <source src="2545Faangifteles6.mp4" type="video/mp4">
        Je browser ondersteunt de video tag niet.
    </video>
</div>

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: var(--wit);
            padding: 30px 35px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-top: 8px solid var(--p-blauw);
        }

        .nav-tabs { display: flex; border-bottom: 3px solid var(--p-blauw); margin-bottom: 25px; gap: 5px; }
        .nav-btn { padding: 14px 28px; border: none; background: none; cursor: pointer; font-weight: bold; color: var(--p-blauw); opacity: 0.6; }
        .nav-btn.active { opacity: 1; border-bottom: 4px solid var(--p-geel); background: #f0f4fa; }
        .sub-page { display: none; }
        .sub-page.active { display: block; }

        .instruction {
            background: #fff8e7;
            border-left: 6px solid var(--p-geel);
            padding: 16px 20px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            border-radius: 0 8px 8px 0;
        }

        .btn-check, .btn-reset {
            border: none; padding: 14px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 40px; margin-top: 20px;
        }
        .btn-check { background: var(--p-blauw); color: white; }
        .btn-reset { background: #6c757d; color: white; margin-bottom: 25px; }

        textarea { width: 100%; padding: 18px; border: 1px solid #bac8d9; font-family: monospace; border-radius: 12px; }
        
        .audio-icon {
            background: var(--p-geel); color: black; padding: 8px 16px; border-radius: 40px; text-decoration: none; font-weight: bold; display: inline-flex; margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color: var(--p-blauw); margin-top: 0;">👮‍♀️ POLITIEACADEMIE</h2>
        <p><strong>Briefing:</strong> Bekijk het fragment (2:10 - 2:50) voor de casusdetails.</p>
        
        <div class="video-box-login">
            <iframe 
                src="https://npo.nl/start/afspelen/pauw-de-wit_145?t=130" 
                width="100%" height="100%" frameborder="0" allowfullscreen>
            </iframe>
        </div>

        <input type="text" id="userFirstName" placeholder="Voornaam agent" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 20px; border: 1px solid #ccc;">
        <select id="userClass" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 20px;">
            <option value="Alpha">NAVO Alpha</option><option value="Bravo">NAVO Bravo</option><option value="Charlie">NAVO Charlie</option>
            <option value="Delta">NAVO Delta</option><option value="Echo">NAVO Echo</option>
        </select>
        <button onclick="startLesson()" class="btn-check" style="background: var(--p-geel); color: black;">START DIENST</button>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <nav class="nav-tabs">
        <button class="nav-btn active" onclick="showPage('page-aangifte', this)">📄 AANGIFTE</button>
        <button class="nav-btn" onclick="showPage('page-ww', this)">✍️ WERKWOORDEN</button>
        <button class="nav-btn" onclick="showPage('page-ontleding', this)">📚 ONTLEDING</button>
    </nav>

    <div id="page-aangifte" class="sub-page active">
        <div class="instruction">
            <strong>Inloggegevens Gemini:</strong> bpostudentleusden@gmail.com | Stud3ntl3usd3n
        </div>
        
        <a href="https://gemini.google.com/gem/1S-TbiyvMUv6QySJN4yJMjYbnyeg9lmul?usp=sharing" target="_blank" class="audio-icon">
            ✨ Open Gemini Gem: Analyseer mijn PV
        </a>

        <textarea id="pvText" rows="12" placeholder="Ik, verbalisant..." oninput="updateLiveFeed()"></textarea>
        <div id="live-feed" style="margin-top:10px; padding:10px; background:#eef2fa; border-left:4px solid var(--p-blauw);">📡 Wacht op invoer...</div>
        <button onclick="submitPV()" class="btn-check">📨 PV DEFINITIEF VERZENDEN</button>
    </div>

    <div id="page-ww" class="sub-page">
        <div id="ww-list"></div>
        <button onclick="checkWW()" class="btn-check">✅ CONTROLEER</button>
    </div>

    <div id="page-ontleding" class="sub-page">
        <div id="ontleding-list"></div>
    </div>
</div>

<script>
    let currentAgent = "";
    let currentKlas = "";

    window.startLesson = () => {
        const naam = document.getElementById('userFirstName').value.trim();
        if (!naam) { alert("Naam verplicht."); return; }
        currentAgent = naam;
        currentKlas = document.getElementById('userClass').value;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        initApp();
    };

    function initApp() {
        // Hier worden de opgaven geladen (zoals in je eerdere code)
        console.log("App geïnitialiseerd voor " + currentAgent);
    }

    function showPage(id, btn) {
        document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    window.updateLiveFeed = () => { /* Logica zoals voorheen */ };
    window.submitPV = () => { alert("PV Verzonden."); };
</script>
</body>
</html>
