            <div id="board-container"><canvas id="whiteboard" width="1200" height="800"></canvas><div id="trash-zone">🗑️</div></div>

                const app = initializeApp(firebaseConfig); const db = getDatabase(app);
                const canvas = document.getElementById("whiteboard"); const ctx = canvas.getContext("2d");
                const boardRef = ref(db, "classes/Alpha/board");
                let objects = {}, isDrawing = false, isDragging = false, draggedId = null, currentPathId = null, currentPoints = [];

                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height), rawX: clientX, rawY: clientY };
                };

                canvas.addEventListener("mousedown", (e) => {
                    const { x, y } = getPos(e);
                    for (const [id, obj] of Object.entries(objects).reverse()) {
                        if (obj.type === "text") {
                            ctx.font = "bold 24px Arial"; const w = ctx.measureText(obj.text).width;
                            if (x > obj.x - 10 && x < obj.x + w + 10 && y > obj.y - 35 && y < obj.y + 15) { draggedId = id; isDragging = true; return; }

                    }
                    isDrawing = true; currentPoints = [{x, y}];
                    const newRef = push(boardRef); currentPathId = newRef.key;
                    set(newRef, { type: "path", points: currentPoints });
                });

                window.addEventListener("mousemove", (e) => {
                    if (!isDrawing && !isDragging) return;
                    const { x, y, rawX, rawY } = getPos(e);
                    if (isDrawing && currentPathId) {
                        currentPoints.push({x, y}); update(ref(db, `classes/Alpha/board/${currentPathId}`), { points: currentPoints });
                    }

                });

                window.addEventListener("mouseup", () => {
                    if (isDragging && draggedId && document.getElementById("trash-zone").classList.contains("active")) remove(ref(db, `classes/Alpha/board/${draggedId}`));
                    isDrawing = isDragging = false; draggedId = currentPathId = null; document.getElementById("trash-zone").classList.remove("active");
                });

                onValue(boardRef, (snap) => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); objects = snap.val() || {};
                    for (let id in objects) {
                        const obj = objects[id];
                        if (obj.type === "text") { ctx.font = "bold 24px Arial"; ctx.fillStyle = "#333"; ctx.fillText(obj.text, obj.x, obj.y); }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
            authDomain: "aangifteq2les1.firebaseapp.com",
            databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aangifteq2les1"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Agent naam ophalen uit localStorage (van login)
        let currentAgent = localStorage.getItem("currentAgentName") || "Onbekend";
        const submissionsRef = ref(db, "pv_submissions");
        
        // Hulp om dubbele automatische reloads te voorkomen: we houden lokale state van de tekst
        let typingTimeout = null;
        const textarea = document.getElementById("myPV");
        
        // Bewaar concept lokaal (zonder database te vervuilen)
        if (localStorage.getItem(`draft_${currentAgent}`)) {
            textarea.value = localStorage.getItem(`draft_${currentAgent}`);
        }
        
        // Auto-save concept (geen hinderlijke reloads, alleen lokaal)
        textarea.addEventListener("input", () => {
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                localStorage.setItem(`draft_${currentAgent}`, textarea.value);
            }, 500);
        });
        
        // INLEVEREN functie
        document.getElementById("submitBtn").addEventListener("click", async () => {
            const pvText = textarea.value.trim();
            if (!pvText) {
                document.getElementById("submitStatus").innerHTML = "⚠️ Voer eerst je PV in voordat je inlevert.";
                setTimeout(() => document.getElementById("submitStatus").innerHTML = "", 2000);
                return;
            }
            
            // Bewaar de inzending in Firebase
            const newSubmission = {
                agent: currentAgent,
                text: pvText,
                timestamp: Date.now(),
                feedbacks: {}  // object met feedback per collega
            };
            
            try {
                await push(submissionsRef, newSubmission);
                document.getElementById("submitStatus").innerHTML = "✅ Ingeleverd! Je PV is zichtbaar in de live feed.";
                setTimeout(() => document.getElementById("submitStatus").innerHTML = "", 3000);
                // Wis concept na inlevering (optioneel)
                localStorage.removeItem(`draft_${currentAgent}`);
            } catch(e) {
                document.getElementById("submitStatus").innerHTML = "❌ Fout bij inleveren. Probeer opnieuw.";
                console.error(e);
            }
        });
        
        // Feedback geven op een specifieke submission
        window.giveFeedback = async (submissionId, agentTo, currentFeedbackText) => {
            const fbText = currentFeedbackText.trim();
            if (!fbText) return;
            
            const submissionRef = ref(db, `pv_submissions/${submissionId}/feedbacks/${currentAgent}`);
            try {
                await set(submissionRef, {
                    from: currentAgent,
                    feedback: fbText,
                    timestamp: Date.now()
                });
                // Clear input field visueel (via DOM update later)
            } catch(e) { console.error("Feedback error", e); }
        };
        
        // Live feed weergeven (geen hinder voor typende studenten - volledig aparte kolom)
        onValue(submissionsRef, (snapshot) => {
            const submissions = snapshot.val();
            const feedDiv = document.getElementById("liveFeed");
            if (!submissions) {
                feedDiv.innerHTML = "<div style='text-align:center; color:#94a3b8;'>📭 Nog geen ingeleverde PV's...</div>";
                return;
            }
            
            // Zet om naar array en sorteer nieuwste eerst
            const submissionsArray = Object.entries(submissions).map(([id, data]) => ({ id, ...data }));
            submissionsArray.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            
            let html = "";
            for (let sub of submissionsArray) {
                const feedbacksObj = sub.feedbacks || {};
                const feedbacksList = Object.values(feedbacksObj);
                
                html += `
                    <div class="submission-item" data-id="${sub.id}">
                        <div class="submission-header">
                            <span>👮 ${sub.agent}</span>
                            <span>🕒 ${new Date(sub.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <div class="submission-text">${escapeHtml(sub.text.substring(0, 500))}${sub.text.length > 500 ? '...' : ''}</div>
                `;
                
                // Toon bestaande feedback
                if (feedbacksList.length > 0) {
                    html += `<div class="feedback-display"><strong>💬 Feedback:</strong><br>`;
                    feedbacksList.forEach(fb => {
                        html += `📌 <strong>${fb.from}</strong>: ${escapeHtml(fb.feedback)}<br>`;
                    });
                    html += `</div>`;
                }
                
                // Voeg feedbackformulier toe (alleen als het niet je eigen inzending is)
                if (sub.agent !== currentAgent) {
                    html += `
                        <div class="feedback-input-area" id="fb-area-${sub.id}">
                            <input type="text" id="fb-input-${sub.id}" class="feedback-input" placeholder="Geef feedback op deze PV...">
                            <button class="feedback-btn" onclick="giveFeedback('${sub.id}', '${sub.agent}', document.getElementById('fb-input-${sub.id}').value)">📨 Verstuur</button>
                        </div>
                    `;
                } else {
                    html += `<div style="font-size:0.7rem; color:#64748b; margin-top:6px;">🔒 Jouw eigen inzending</div>`;
                }
                html += `</div>`;
            }
            feedDiv.innerHTML = html;
        });
        
        // Helper om XSS te voorkomen
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // toon huidige agent in console (debug)
        console.log("Actieve agent:", currentAgent);
    </script>
