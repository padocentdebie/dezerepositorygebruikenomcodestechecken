   <!-- SCHERM 6: STRUCTUURWOORDEN ZONDER VERTRAGING -->
<div id="screen6" class="screen">
    <iframe id="vz_frame" srcdoc='<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><style>body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; } .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); } h1 { color: #003082; font-size: 1.5rem; } .sentence { font-size: 1.1rem; margin: 20px 0; line-height: 1.5; color: #334155; min-height: 50px; } .wrong-word { color: #d32f2f; text-decoration: underline; font-weight: bold; } input { width: 80%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; } .btn { background: #003082; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: bold; } .score-board { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; text-align: left; } .leader-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f1f5f9; }</style></head><body><div class="container"><h1>Structuurwoorden Verbeteren</h1><p>Vervang het foute woord door: <strong>dus</strong>, <strong>daarom</strong> of <strong>vervolgens</strong></p><div class="sentence" id="display-sentence">Laden van de eerste oefening...</div><input type="text" id="answer" placeholder="Typ het juiste structuurwoord..."><br><button class="btn" onclick="check()">Verbeteren</button><div class="score-board"><h3>Leaderboard (Live)</h3><div id="leaderboard">Nog geen scores...</div></div></div><script type="module">import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"; import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"; const cfg = { apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4", databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app" }; const app = initializeApp(cfg); const db = getDatabase(app); const natoNames = ["Alpha", "Bravo", "Charlie", "Delta", "Echo", "Foxtrot", "Golf", "Hotel", "Juliett", "Kilo", "Lima", "Mike"]; const myName = natoNames[Math.floor(Math.random() * natoNames.length)]; const data = [
      { q: "De verdachte weigerde mee te werken, <span class=\"wrong-word\">hierop</span> arrestereerde ik hem.", a: "daarom" },
      { q: "Ik zag de man rennen, <span class=\"wrong-word\">daarop</span> hiel ik de man staande.", a: "vervolgens" },
      { q: "De getuige was erg zenuwachtig, <span class=\"wrong-word\">hierop</span> besloot ik later terug te komen.", a: "daarom" },
      { q: "Ik opende de kofferbak, <span class=\"wrong-word\">daarop</span> trof ik een vuurwapen aan.", a: "vervolgens" },
      { q: "De man kon zich niet legitimeren, <span class=\"wrong-word\">hierop</span> kreeg hij een boete.", a: "dus" },
      { q: "Ik hoorde een harde knal, <span class=\"wrong-word\">daarop</span> rende ik naar buiten.", a: "vervolgens" },
      { q: "Het slachtoffer was gewond, <span class=\"wrong-word\">hierop</span> belde ik een ambulance.", a: "daarom" },
      { q: "Ik vroeg om zijn rijbewijs, <span class=\"wrong-word\">daarop</span> gaf hij mij een paspoort.", a: "vervolgens" },
      { q: "De winkeldief werd betrapt, <span class=\"wrong-word\">hierop</span> is de politie ingeschakeld.", a: "dus" },
      { q: "Ik doorzocht de woning, <span class=\"wrong-word\">daarop</span> vond ik de gestolen goederen.", a: "vervolgens" },
      { q: "Hij reed door rood licht, <span class=\"wrong-word\">hierop</span> zette ik de achtervolging in.", a: "daarom" },
      { q: "Ik keek in de tas, <span class=\"wrong-word\">daarop</span> zag ik een zakje wit poeder.", a: "vervolgens" },
      { q: "De melding was zeer dringend, <span class=\"wrong-word\">hierop</span> reden wij met zwaailicht.", a: "daarom" },
      { q: "Ik schreef de bekeuring uit, <span class=\"wrong-word\">daarop</span> overhandigde ik deze aan de bestuurder.", a: "vervolgens" },
      { q: "De verdachte bekende de diefstal, <span class=\"wrong-word\">hierop</span> was de zaak rond.", a: "dus" },
      { q: "Ik sprak de groep aan, <span class=\"wrong-word\">daarop</span> liepen zij rustig weg.", a: "vervolgens" },
      { q: "Er was sprake van gevaar, <span class=\"wrong-word\">hierop</span> ontruimden we het plein.", a: "daarom" },
      { q: "Ik pakte mijn handboeien, <span class=\"wrong-word\">daarop</span> boeide ik de verdachte.", a: "vervolgens" },
      { q: "De camerabeelden waren duidelijk, <span class=\"wrong-word\">hierop</span> konden we de dader herkennen.", a: "daarom" },
      { q: "Ik stelde de vragen, <span class=\"wrong-word\">daarop</span> gaf de man eerlijk antwoord.", a: "vervolgens" }
    ]; 
    let current = 0; let score = 0; 
    
    // START DIRECT BIJ LADEN
    document.getElementById("display-sentence").innerHTML = data[0].q;

    window.check = () => { 
        const input = document.getElementById("answer").value.toLowerCase().trim(); 
        if(input === data[current].a.toLowerCase()) { 
            score++; current++; 
            update(ref(db, "leaderboard/structuur/" + myName), { score: score }); 
            if(current < data.length) { 
                document.getElementById("display-sentence").innerHTML = data[current].q; 
                document.getElementById("answer").value = ""; 
            } else { 
                document.getElementById("display-sentence").innerHTML = "<strong>Gefeliciteerd! Je hebt alle structuurwoorden verbeterd.</strong>"; 
                document.getElementById("answer").style.display = "none";
            } 
        } else { alert("Helaas, dat is niet het juiste structuurwoord. Probeer het opnieuw!"); }
    }; 
    
    onValue(ref(db, "leaderboard/structuur"), (snap) => { 
        const list = snap.val() || {}; 
        const html = Object.entries(list).sort((a,b) => b[1].score - a[1].score).map(([n,v]) => `<div class="leader-row"><span>Agent ${n}</span><span>${v.score || 0} pnt</span></div>`).join(""); 
        if(html) document.getElementById("leaderboard").innerHTML = html; 
    }); 
    <\/script></body></html>'></iframe>
</div>
</main>

<script>
    function showScreen(nr) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + nr).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.nav-item')[nr-1].classList.add('active');
    }
</script>

</body>
</html>
