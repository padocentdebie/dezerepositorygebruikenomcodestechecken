                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height), rawX: clientX, rawY: clientY };
                };

                canvas.addEventListener("mousedown", (e) => {

                        if (obj.type === "text") {
                            ctx.font = "bold 24px Arial"; const w = ctx.measureText(obj.text).width;

                    if (!isDrawing && !isDragging) return;
                    const { x, y, rawX, rawY } = getPos(e);

                window.addEventListener("mouseup", () => {
                    if (isDragging && draggedId && document.getElementById("trash-zone").classList.contains("active")) remove(ref(db, `classes/Alpha/board/${draggedId}`));
                    isDrawing = isDragging = false; draggedId = currentPathId = null; document.getElementById("trash-zone").classList.remove("active");
                });

                onValue(boardRef, (snap) => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); objects = snap.val() || {};
                    for (let id in objects) {
                        const obj = objects[id];

                }
                
                if (userAnswer === currentItem.correct) {
                    // Goed antwoord -> score verhogen (alleen als deze vraag nog niet eerder is beantwoord?)
                    // We zorgen ervoor dat je niet opnieuw punten krijgt voor dezelfde vraag door een vlag
                    if (!window._answeredFlags) window._answeredFlags = {};
                    if (!window._answeredFlags[currentIndex]) {
                        userScore++;
                        window._answeredFlags[currentIndex] = true;
                        totalAnswered++;
                        // Update firebase leaderboard
                        const scoreRef = ref(db, `leaderboard/structuur/${agentName}`);
                        await set(scoreRef, { score: userScore, lastUpdate: Date.now() });
                        
                        document.getElementById("directFeedback").innerHTML = "✅ Correct! +1 punt. Ga naar de volgende.";
                        // Korte visuele feedback
                        inputField.style.borderColor = "#16a34a";
                        setTimeout(() => inputField.style.borderColor = "#cbd5e1", 500);
                        
                        // Volgende vraag
                        currentIndex++;
                        loadQuestion();
                    } else {
                        // Al beantwoord (zou niet makkelijk kunnen, maar veiligheid)
                        document.getElementById("directFeedback").innerHTML = "⏳ Deze zin heb je al goed gedaan! Ga verder met de volgende.";
                        currentIndex++;
                        loadQuestion();
                    }
                } else {
                    // Fout antwoord
                    document.getElementById("directFeedback").innerHTML = `❌ Fout! Het juiste woord was "<strong>${currentItem.correct}</strong>". Probeer de volgende zin.`;
                    inputField.style.borderColor = "#dc2626";
                    setTimeout(() => inputField.style.borderColor = "#cbd5e1", 800);
                    // Toch doorschieten naar volgende vraag (zonder punten)
                    currentIndex++;
                    loadQuestion();
                }
            };

            // Leaderboard live ophalen en weergeven
            function updateLeaderboard() {
                const leaderRef = ref(db, "leaderboard/structuur");
                onValue(leaderRef, (snapshot) => {
                    const data = snapshot.val() || {};
                    const sorted = Object.entries(data)
                        .map(([name, val]) => ({ name, score: val.score || 0 }))
                        .sort((a, b) => b.score - a.score)
                        .slice(0, 8);
                    
                    if (sorted.length === 0) {
                        document.getElementById("leaderboard").innerHTML = "✨ Nog geen scores. Wees de eerste!";
                        return;
                    }
                    
                    let html = "";
                    for (let entry of sorted) {
                        const isMe = (entry.name === agentName);
                        html += `<div class="leader-row">
                                    <span>${isMe ? "⭐ " : ""}${entry.name} ${isMe ? "(jij)" : ""}</span>
                                    <span style="font-weight:bold;">${entry.score} pt</span>
                                 </div>`;
                    }
                    document.getElementById("leaderboard").innerHTML = html;
                }, (error) => {
                    console.warn("Leaderboard error, maar oefening werkt wel");
                    document.getElementById("leaderboard").innerHTML = "📡 Leaderboard tijdelijk offline, scores worden lokaal bijgehouden.";
                });
            }

            // INIT: laad eerste vraag en leaderboard direct (geen vertraging)
            loadQuestion();
            updateLeaderboard();
            
            // Toetsenbord: Enter = controleren
            document.getElementById("answer").addEventListener("keypress", (e) => {
                if (e.key === "Enter") checkAnswer();
            });
            
            // Fallback: zorg dat zichtbaar is dat alles werkt
            console.log("✅ Les 6 Structuurwoorden actief, agent:", agentName);
        </script>
        </body>
        </html>'></iframe>
